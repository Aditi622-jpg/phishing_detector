<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Phishing Detector</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand" href="{{ url_for('home') }}">
        <i class="bi bi-shield-lock"></i> Phishing Detector
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          {% if session.get('user') %}
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('upload_form') }}">
                <i class="bi bi-upload"></i> Analyze Email
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('dashboard') }}">
                <i class="bi bi-speedometer2"></i> Dashboard
              </a>
            </li>
            <!-- ✅ Blacklist link visible to all logged-in users -->
            <li class="nav-item">
              <a class="nav-link" href="http://127.0.0.1:5000/blacklist">
                <i class="bi bi-ban"></i> Blacklist
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-danger" href="{{ url_for('logout') }}">
                <i class="bi bi-box-arrow-right"></i> Logout
              </a>
            </li>
          {% endif %}
        </ul>
      </div>
    </div>
  </nav>

  <!-- Session Timer -->
  {% if session.get('user') %}
  <div id="session-timer" class="text-center mt-2 fw-bold text-danger"></div>
  {% endif %}

  <!-- Main Content -->
  <div class="container mt-4">
    {% block content %}{% endblock %}
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Session Countdown Script -->
  <script>
    // Match Flask expiry (90 minutes = 5400 seconds)
    let timeoutSeconds = 5400;

    function startSessionTimer() {
      let timerDisplay = document.getElementById("session-timer");
      if (!timerDisplay) return;

      let remaining = timeoutSeconds;
      let interval = setInterval(() => {
        let minutes = Math.floor(remaining / 60);
        let seconds = remaining % 60;
        timerDisplay.textContent = `Session expires in ${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;

        remaining--;

        if (remaining < 0) {
          clearInterval(interval);
          alert("Session expired! Please log in again.");
          window.location.href = "/login";
        }
      }, 1000);
    }

    window.onload = startSessionTimer;
  </script>
</body>
</html>
