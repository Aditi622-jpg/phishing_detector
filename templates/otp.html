{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
  <div class="card shadow-sm p-4">
    <h3 class="text-center">Enter OTP</h3>
    <form method="POST" class="mt-3">
      <div class="mb-3">
        <label for="otp" class="form-label">6-digit OTP</label>
        <input type="text" class="form-control" id="otp" name="otp" maxlength="6" required>
      </div>
      {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
      {% endif %}
      <button type="submit" class="btn btn-primary w-100">Verify</button>
    </form>
    <div class="alert alert-warning mt-3">
      ⚠️ Demo purpose only — in production, the OTP would be sent to the registered device.
    </div>
    {% if demo_otp %}
      <div class="alert alert-info mt-3">
        🔑 Your demo OTP is: <strong>{{ demo_otp }}</strong>
      </div>
    {% endif %}
  </div>
</div>
{% endblock %}
